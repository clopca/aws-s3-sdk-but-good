name: Nightly Quality

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:docs-snippets
      - run: pnpm test
      - run: pnpm test:coverage
      - run: pnpm size:check

  package-quality:
    name: Package Quality
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm dlx publint packages/core packages/react packages/browser packages/shared
      - run: pnpm dlx @arethetypeswrong/cli --pack --profile node16 packages/core
      - run: pnpm dlx @arethetypeswrong/cli --pack --profile node16 --exclude-entrypoints=./styles.css packages/react
      - run: pnpm dlx @arethetypeswrong/cli --pack --profile node16 --exclude-entrypoints=./styles.css packages/browser
      - run: pnpm dlx @arethetypeswrong/cli --pack --profile node16 packages/shared
      - run: mkdir -p .tmp/packs
      - run: find .tmp/packs -mindepth 1 -maxdepth 1 -type f -delete
      - run: for pkg in packages/core packages/react packages/browser packages/shared; do pnpm --dir "$pkg" pack --pack-destination ../../.tmp/packs; done

  e2e:
    runs-on: ubuntu-latest
    needs: [quality, package-quality]
    environment: e2e-testing
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Configure AWS credentials
        if: env.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          S3_TEST_BUCKET: ${{ secrets.S3_TEST_BUCKET }}
          S3_TEST_REGION: us-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
